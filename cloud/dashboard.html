<!DOCTYPE html>
<html>
<head>
    <title>Health Monitoring Cloud Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto';
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h3 {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .card-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .status-green {
            background: #d4edda;
            color: #155724;
        }

        .status-red {
            background: #f8d7da;
            color: #721c24;
        }

        .status-yellow {
            background: #fff3cd;
            color: #856404;
        }

        .chart-container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .chart-container h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .devices-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .devices-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .device-item {
            padding: 15px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .device-info {
            flex: 1;
        }

        .device-id {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .device-stats {
            font-size: 0.9em;
            color: #666;
        }

        .device-risk {
            background: #667eea;
            color: white;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .last-update {
            color: white;
            text-align: center;
            font-size: 0.9em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏥 Health Monitoring Cloud Dashboard</h1>
            <p>Real-time aggregation from ARM edge devices</p>
        </header>

        <button class="refresh-btn" onclick="refreshData()">🔄 Refresh Data</button>

        <div class="grid">
            <div class="card">
                <h3>Total Predictions</h3>
                <div class="card-value" id="total">0</div>
            </div>
            <div class="card">
                <h3>Average Risk</h3>
                <div class="card-value" id="avgRisk">0</div>
            </div>
            <div class="card">
                <h3>High Risk Count</h3>
                <div class="card-value" id="highRisk">0</div>
                <span class="status-badge" id="outbreakStatus"></span>
            </div>
            <div class="card">
                <h3>Active Devices</h3>
                <div class="card-value" id="devices">0</div>
            </div>
        </div>

        <div class="chart-container">
            <h2>📊 Risk Score Distribution</h2>
            <canvas id="riskChart"></canvas>
        </div>

        <div class="devices-section">
            <h2>📱 Connected Devices</h2>
            <div id="devicesList"></div>
        </div>

        <div class="last-update">
            Last updated: <span id="lastUpdate">--:--:--</span>
        </div>
    </div>

    <script>
        let riskChart = null;

        async function fetchData() {
            try {
                // Fetch stats
                const statsRes = await fetch('http://localhost:8000/stats');
                const stats = await statsRes.json();

                // Fetch devices
                const devicesRes = await fetch('http://localhost:8000/devices');
                const devicesData = await devicesRes.json();

                // Fetch outbreak info
                const outbreakRes = await fetch('http://localhost:8000/outbreak');
                const outbreak = await outbreakRes.json();

                updateUI(stats, devicesData, outbreak);
            } catch (err) {
                console.error('Error fetching data:', err);
                document.getElementById('devicesList').innerHTML = 
                    '<p style="color: red;">⚠️ Error: Backend not running. Make sure cloud backend is on port 8000</p>';
            }
        }

        function updateUI(stats, devicesData, outbreak) {
            // Update stats cards
            document.getElementById('total').textContent = stats.total_predictions;
            document.getElementById('avgRisk').textContent = stats.average_risk;
            document.getElementById('highRisk').textContent = stats.high_risk_count;
            document.getElementById('devices').textContent = devicesData.total_devices;

            // Update outbreak status
            const statusEl = document.getElementById('outbreakStatus');
            if (outbreak.alert_level === '🔴 HIGH') {
                statusEl.textContent = '🔴 OUTBREAK';
                statusEl.className = 'status-badge status-red';
            } else if (outbreak.alert_level === '🟡 MODERATE') {
                statusEl.textContent = '⚠️ MONITOR';
                statusEl.className = 'status-badge status-yellow';
            } else {
                statusEl.textContent = '🟢 NORMAL';
                statusEl.className = 'status-badge status-green';
            }

            // Update chart
            updateChart(stats.high_risk_count, stats.total_predictions - stats.high_risk_count);

            // Update devices list
            updateDevicesList(devicesData.devices);

            // Update timestamp
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
        }

        function updateChart(highRisk, lowRisk) {
            const ctx = document.getElementById('riskChart').getContext('2d');
            
            if (riskChart) {
                riskChart.destroy();
            }

            riskChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['High Risk', 'Low/Medium Risk'],
                    datasets: [{
                        data: [highRisk, lowRisk],
                        backgroundColor: ['#e74c3c', '#27ae60'],
                        borderColor: ['#c0392b', '#229954'],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                font: { size: 14 },
                                padding: 20
                            }
                        }
                    }
                }
            });
        }

        function updateDevicesList(devices) {
            const list = document.getElementById('devicesList');
            
            if (devices.length === 0) {
                list.innerHTML = '<p style="color: #999;">No devices connected yet</p>';
                return;
            }

            list.innerHTML = devices.map(device => `
                <div class="device-item">
                    <div class="device-info">
                        <div class="device-id">📱 ${device.device_id}</div>
                        <div class="device-stats">
                            ${device.total_predictions} predictions | 
                            Avg Risk: ${device.average_risk} | 
                            Peak: ${device.peak_risk}
                        </div>
                    </div>
                    <div class="device-risk">
                        ${device.average_risk > 70 ? '🔴' : device.average_risk > 40 ? '🟡' : '🟢'} 
                        ${device.average_risk}
                    </div>
                </div>
            `).join('');
        }

        function refreshData() {
            fetchData();
        }

        // Auto-refresh every 5 seconds
        setInterval(fetchData, 5000);

        // Initial load
        fetchData();
    </script>
</body>
</html>
